name: CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai pydub

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py' -q

  package:
    name: Package Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release bundle
        run: |
          mkdir -p dist
          tar -czf dist/ai-transcribe-${{ github.sha }}.tar.gz \
            transcribe_folder.py README.md LICENSE

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-transcribe-${{ github.sha }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release bundle
        run: |
          mkdir -p dist
          tar -czf dist/ai-transcribe-${{ github.ref_name }}.tar.gz \
            transcribe_folder.py README.md LICENSE

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
